# Self-hosted QwenWeaver with SQLite
# Usage: docker compose up -d
# Access: http://localhost:3001
version: "3.9"

services:
  qwenweaver:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qwenweaver
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      API_SECRET: ${API_SECRET:-change-me-in-production}
      DATABASE_URL: /data/dev.db
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Set this to your frontend URL for CORS
      # CORS_ORIGINS: http://localhost:5173,https://your-domain.com
      # Uncomment to add Dashscope API key for AI agents
      # DASHSCOPE_API_KEY: your-key-here
    volumes:
      - qwenweaver-data:/data

volumes:
  qwenweaver-data:
