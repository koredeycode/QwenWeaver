name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main, dev]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'Dockerfile'
      - 'docker-compose.prod.yml'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - 'tsconfig*.json'
      - '.github/workflows/ci.yml'
      - '.github/workflows/deploy.yml'
  workflow_call:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
