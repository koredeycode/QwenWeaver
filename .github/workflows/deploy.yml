name: Deploy to VPS

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'Dockerfile'
      - 'docker-compose.prod.yml'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - 'tsconfig*.json'
      - '.github/workflows/ci.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  build-and-push:
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push qwenweaver image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/qwenweaver/qwenweaver:latest
            ghcr.io/${{ github.repository_owner }}/qwenweaver/qwenweaver:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/koredeycode/qwenweaver
            org.opencontainers.image.revision=${{ github.sha }}

      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: |
          tar czf site-dist.tar.gz -C apps/site/dist .
          tar czf app-dist.tar.gz -C apps/app/dist .

      - uses: actions/upload-artifact@v4
        with:
          name: builds
          path: |
            site-dist.tar.gz
            app-dist.tar.gz

  deploy:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: builds

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Write .env from secrets
        run: |
          cat > .env << EOF
          API_SECRET=${{ secrets.API_SECRET }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          DASHSCOPE_API_KEY=${{ secrets.DASHSCOPE_API_KEY }}
          CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
          PUBLIC_URL=${{ secrets.PUBLIC_URL }}
          CREDENTIALS_ENCRYPTION_KEY=${{ secrets.CREDENTIALS_ENCRYPTION_KEY }}
          EOF

      - name: Deploy to VPS
        run: |
          scp docker-compose.prod.yml site-dist.tar.gz app-dist.tar.gz .env deploy@${{ secrets.VPS_HOST }}:/home/deploy/qwenweaver/

            ssh deploy@${{ secrets.VPS_HOST }} << 'ENDSSH'
            set -euo pipefail

            mkdir -p /home/deploy/qwenweaver/www/{site,app}
            cd /home/deploy/qwenweaver/www
            tar xzf ../site-dist.tar.gz -C site --no-same-owner
            tar xzf ../app-dist.tar.gz -C app --no-same-owner
            rm -f ../site-dist.tar.gz ../app-dist.tar.gz
            chmod o+x /home/deploy /home/deploy/qwenweaver /home/deploy/qwenweaver/www
            chmod -R o+rX /home/deploy/qwenweaver/www

            cd /home/deploy/qwenweaver
            echo ${{ secrets.GHCR_PAT }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml up -d --no-deps qwenweaver
            docker image prune -af
            docker builder prune -af
            df -h /
          ENDSSH

      - name: Health Check
        run: |
          sleep 15
          curl -sf https://app.qwenweaver.xyz/api/health \
            && echo "Deployment OK" \
            || exit 1
