# Production QwenWeaver with Supabase (external PostgreSQL)
# Usage: docker compose -f docker-compose.prod.yml up -d
# Requires: .env file with DATABASE_URL, API_SECRET, etc.
version: "3.9"

services:
  qwenweaver:
    image: ghcr.io/koredeycode/qwenweaver/qwenweaver:latest
    container_name: qw-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      HOST: 0.0.0.0
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: https://api.qwenweaver.xyz/api
      PUBLIC_URL: ${PUBLIC_URL}
      DATABASE_URL: ${DATABASE_URL}
      API_SECRET: ${API_SECRET}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      CREDENTIALS_ENCRYPTION_KEY: ${CREDENTIALS_ENCRYPTION_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GH_CLIENT_ID: ${GH_CLIENT_ID}
      GH_CLIENT_SECRET: ${GH_CLIENT_SECRET}
      BREVO_API_KEY: ${BREVO_API_KEY}
      BREVO_SENDER_EMAIL: ${BREVO_SENDER_EMAIL}
      BREVO_SENDER_NAME: ${BREVO_SENDER_NAME}
      LOG_LEVEL: info
