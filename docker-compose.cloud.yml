# Cloud / SaaS QwenWeaver with PostgreSQL
# Usage: docker compose -f docker-compose.cloud.yml up -d
# Access: http://localhost:3001
version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: qwenweaver-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: qwenweaver
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: qwenweaver
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qwenweaver"]
      interval: 5s
      timeout: 5s
      retries: 5

  qwenweaver:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qwenweaver
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      API_SECRET: ${API_SECRET:-change-me-in-production}
      DATABASE_URL: postgres://qwenweaver:${POSTGRES_PASSWORD:-change-me}@postgres:5432/qwenweaver
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}

volumes:
  postgres-data:
